name: Compilar APK (Android)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev build-essential ccache
          pip install --upgrade pip
          pip install "cython==0.29.36" buildozer

      - name: Compilar o APK (debug)
        run: buildozer android debug

      - name: Publicar o APK
        uses: actions/upload-artifact@v4
        with:
          name: rastreadorcla-apk
          path: bin/*.apk
          if-no-files-found: error
